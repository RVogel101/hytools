name: Extraction pipeline

on:
  schedule:
    - cron: '0 2 * * *'          # nightly at 02:00 UTC
  workflow_dispatch:             # manual trigger

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration repo
        uses: actions/checkout@v3
        with:
          path: project
      - name: Checkout core package
        uses: actions/checkout@v3
        with:
          path: armenian-corpus-core
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd project
          pip install -e ../armenian-corpus-core
          pip install -r requirements.txt
      - name: Run pipeline
        run: |
          cd project
          python -m armenian_corpus_core.extraction.run_extraction_pipeline \
            --project project \
            --output-json project/08-data/pipeline_report.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: extraction-results
          path: project/08-data/*.jsonl,project/08-data/*.json
