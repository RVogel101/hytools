name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest tests/ -v

  extraction:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Checkout lousardzag
        uses: actions/checkout@v4
        with:
          repository: RVogel101/lousardzag
          path: lousardzag
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install -e lousardzag 2>/dev/null || true
      - name: Run extraction pipeline
        run: |
          python -m armenian_corpus_core.extraction.run_extraction_pipeline \
            --project lousardzag \
            --output-json lousardzag/08-data/pipeline_report.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extraction-results
          path: |
            lousardzag/08-data/*.jsonl
            lousardzag/08-data/*.json
