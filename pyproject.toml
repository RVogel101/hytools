[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "armenian-corpus-core"
version = "0.1.0-alpha"
description = "Central package for Armenian language corpus contracts, extraction, and normalization"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Lousardzag Contributors", email = "lousardzag@example.com"},
]
keywords = ["armenian", "corpus", "linguistics", "nlp", "extraction"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
    "isort>=5.10",
    "mypy>=1.0",
]

[project.urls]
Repository = "https://github.com/lousardzag/armenian-corpus-core"
Documentation = "https://github.com/lousardzag/armenian-corpus-core/wiki"

[tool.setuptools.packages.find]
where = ["."]
include = ["armenian_corpus_core*"]

[tool.setuptools.package-data]
armenian_corpus_core = ["py.typed"]
