# hytools configuration
# Copy to settings.yaml and adjust as needed.

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  data_root: "data"
  raw_dir: "data/raw"
  cleaned_dir: "data/cleaned"
  filtered_dir: "data/filtered"
  log_dir: "data/logs"
  metadata_dir: "data/metadata"
  cache_dir: "cache"
  # Set to true for zero local storage: delete bz2/PDFs/images after ingest
  delete_after_ingest: false

# ── Database ──────────────────────────────────────────────────────────────────
database:
  use_mongodb: true
  mongodb_uri: "mongodb://localhost:27017/"
  mongodb_database: "western_armenian_corpus"
  # Etymology (Phase 1): optional path to Wiktextract/kaikki Armenian JSONL for import_etymology_from_wiktextract
  # etymology_wiktextract_path: "data/raw/kaikki-dictionary-Armenian.json"
  # Compute TextMetricCard per document on ingestion (slower ingest, enables per-doc baseline)
  compute_metrics_on_ingest: true

# ── OCR ──────────────────────────────────────────────────────────────────────
ocr:
  dpi: 300
  tesseract_lang: "hye+eng"
  # Per-page language: "off" (single lang) | "auto" (detect script ratio) | "hye" | "hye+eng" | "eng"
  per_page_lang: "auto"
  tesseract_lang_armenian: "hye"
  tesseract_lang_mixed: "hye+eng"
  tesseract_lang_english: "eng"
  script_armenian_threshold: 0.9
  script_english_threshold: 0.9
  binarization: "sauvola"
  confidence_threshold: 60
  # PSM: 3 = auto layout, 6 = uniform block (better for textbook body text).
  psm: 6
  # Embedded PDF text (PyMuPDF): false | true | auto (probe pages across the PDF; heuristic).
  use_text_layer: auto
  # Re-process all pages even if page_####.txt exists (also: CLI --overwrite / -f)
  overwrite: false
  # Dynamic DPI: probe first page, measure character height, choose DPI for 20–30 px letters
  adaptive_dpi: true
  font_hint: "normal"   # "tiny" | "normal" | "cursive" to override
  probe_dpi: 200
  # Cursive detection: auto-detect and apply cursive-optimized preprocessing
  detect_cursive: true
  cursive_threshold: 0.5
  # Surya deep-learning OCR engine (runs locally, GPU-accelerated)
  # "auto" = use when surya-ocr is installed, false = Tesseract only, true = always try
  use_surya: auto
  # Zone OCR: split mixed Armenian+English pages into script-specific zones
  # "auto" = split when per_page_lang is "auto" and page is mixed, false = disabled, true = always
  zone_ocr: auto
  # Page classification: route pages to optimal OCR strategy before processing
  # "auto" = classify when per_page_lang is "auto", false = disabled, true = always
  classify_pages: auto
  # Stroke thickening: morphological dilation for degraded / thin type
  # "auto" = detect thin strokes and thicken when needed, false = disabled, true = always
  stroke_thicken: false
  stroke_thin_threshold: 2.5    # median stroke width (px) below which auto triggers
  stroke_thicken_iterations: 1  # dilation passes (1 is usually sufficient)
  stroke_thicken_kernel: 2      # structuring element side length (px)
  # Classical orthography pass: extra Tesseract pass with hye_old traineddata for stubborn pages
  # "auto" = try when hye_old traineddata is installed, false = disabled, true = always try
  classical_ocr: auto
  classical_lang: "hye_old"     # Tesseract lang name for classical model
  classical_threshold: 15.0     # score below which the classical pass fires
  # Production monitoring: alert when failure rate exceeds threshold
  monitor_alert_threshold: 0.10  # fraction (0–1); 0.10 = warn if >10% pages fail
  monitor_min_pages: 3           # don't alert on PDFs with fewer pages than this
  # Hybrid OCR engines (optional deps): compete on score alongside Tesseract/Surya
  # "auto" = use when installed, false = disabled, true = always try
  use_ocrmypdf: auto
  use_kraken: auto
  kraken_model: ""               # path or name of Kraken model; empty = built-in default
  # ML-backed post-correction: seq2seq model that fixes common OCR errors
  # "auto" = use when model_path is set and transformers is installed, false = disabled
  ml_corrector: auto
  ml_corrector_model: ""         # HuggingFace model id or local checkpoint path
  ml_corrector_max_length: 512   # max token/char length per chunk
  # ArmCor: Armenian corpus-frequency post-correction
  # "auto" = enable when freq_path points to a valid frequency JSON, false = disabled
  armcor_correction: auto
  armcor_freq_path: ""           # path to word-frequency JSON: {"word": count, ...} (fallback)
  armcor_freq_path_wa: ""        # Western Armenian frequency JSON (used when variant is "western" or "auto"-detected)
  armcor_freq_path_ea: ""        # Eastern Armenian frequency JSON (used when variant is "eastern" or "auto"-detected)
  armcor_min_freq: 3             # minimum corpus frequency to trust a correction
  armcor_max_edit_distance: 1    # max Levenshtein edits per token (1 or 2)

# ── Augmentation ─────────────────────────────────────────────────────────────
augmentation:
  use_safe_wrapper: true  # Phase 1: Wrap LLM strategies in SafeAugmentationWrapper for stricter WA
  output_backend: "mongodb"
  source_backend: "mongodb"

# ── Cleaning ──────────────────────────────────────────────────────────────────
cleaning:
  minhash_threshold: 0.85
  minhash_num_perm: 128
  target_language: "hyw"
  min_chars_per_doc: 100

# ── ANN dedupe (optional) ─────────────────────────────────────────────────────
ann_dedup:
  enabled: true
  backend: "annoy"  # annoy, faiss, brute
  metric: "euclidean"  # euclidean or angular
  distance_threshold: 0.90
  n_trees: 20
  n_neighbors: 32
  vectors_path: "data/ann_vectors.npz"
  index_path: "data/ann_index.ann"
  force_rebuild: false

# ── Scraping ───────────────────────────────────────────────────────────────────
scraping:
  # Compute per-document metrics (word_counts, TextMetricCard, loanwords) on each ingest. Default True.
  compute_metrics_on_ingest: true
  wikipedia:
    enabled: true
    language: "hyw"
    dump_date: "latest"
  wikisource:
    enabled: true
  archive_org:
    enabled: true
  culturax:
    enabled: false
    dataset_name: "uonlp/CulturaX"
    language: "hy"
    streaming: true
  opus:
    enabled: true
    # corpora: null means all corpora (CCAligned_hyw, CCAligned_hy, NLLB_hyw).
    # Set to a list to restrict: e.g. ["CCAligned_hyw", "NLLB_hyw"]
    corpora: null
  jw:
    enabled: true
    # include_eastern: also scrape https://www.jw.org/hy/ (Eastern Armenian) and tag as hye
    include_eastern: true
  hathitrust:
    enabled: true
  gallica:
    enabled: false
  loc:
    enabled: true
  dpla:
    enabled: false
    api_key: ""   # enable only after supplying a real DPLA API key
  newspapers:
    enabled: true
    # Historical crawler (diaspora newspapers: Aztag, Horizon, Asbarez, Hairenik, Armenian Weekly, Keghart, Nor Or, Marmara, Jamanag, Massis Post, Mirror-Spectator).
    sources: ["hairenik", "armenian_weekly", "horizon", "marmara", "jamanag", "massis_post", "mirror_spectator"]
    max_pages: 0    # 0 = no explicit cap; crawler stops when listing pages are empty
    max_articles_per_source: 0  # 0 = no per-source cap; rely on site pagination to stop
  web_crawler:
    enabled: false
    seed_file: "data/retrieval/crawler_seeds.txt"
    discovery_report: "data/retrieval/crawler_found.csv"
    audit_report_csv: "data/retrieval/wa_crawler_audit.csv"
    audit_report_json: "data/retrieval/wa_crawler_audit.json"
    max_depth: 2
    max_pages_per_domain: 50
    max_total_pages: 500
    request_delay_seconds: 2.0
    wa_threshold: 5.0
    min_armenian_ratio: 0.10
    min_text_chars: 200
    user_agent: "HytoolsCorpusCrawler/1.0 (+https://github.com/RVogel101/hytools)"
    allow_http: false
    allow_external_domains: false
    search_seeding:
      enabled: false
      max_results_per_query: 10
      include_existing_corpus_urls: true
      existing_corpus_seed_limit: 250
    incremental:
      enabled: true
      recrawl_after_hours: 168
      resume_frontier: true
      state_sync_every: 25
    playwright_fallback:
      enabled: false
      timeout_ms: 15000
  hamazkayin:
    enabled: true
    # sites: null  # null = scrape all (pakine, hamazkayin). Example: ["pakine"]
  gomidas:
    enabled: false
  mechitarist:
    enabled: false
  agbu:
    enabled: false
  agos:
    enabled: false
  ocr_ingest:
    enabled: false
  mss_nkr:
    enabled: false
  nayiri:
    enabled: true
    lexicon_url: "https://www.nayiri.com/nayiri-armenian-lexicon-2026-02-15-v1.json.zip"
    corpus_url: "https://www.nayiri.com/nayiri-corpus-of-western-armenian-2026-02-25-v2.zip"
    lexicon_path: "cache\\nayiri-armenian-lexicon-2026-02-15-v1.json.zip"
    corpus_path: "cache\\nayiri-corpus-of-western-armenian-2026-02-25-v2.zip"
    lexicon_keep_zip: false
    corpus_keep_zip: false
  eastern_armenian:

    enabled: true
    # Historical crawler (Republic / EA agencies: Armenpress, A1+, Armtimes, Aravot).
    # max_articles_per_agency: 0  # 0 = no cap; crawler stops when feeds + fallback listing pages are exhausted
  rss_news:
    enabled: true
    # populate_catalog: true  # when true: (1) update news_article_catalog from all RSS (one doc per URL; language_code, content_type, writing_category; sources/feed_urls arrays), (2) scrape each new article, insert into documents with same tags, set catalog.document_id. One process, no duplicate full articles. See docs/concept_guides/NEWS_AND_RSS_CATALOG.md.
  english_sources:
    enabled: true
  worldcat:
    enabled: false
  cleaning:
    enabled: true
  metadata_tagger:
    enabled: true
    # Set to true or a file path to write CSV report: document_id, source, char_count, word_count, enriched
    # output_csv: true
    # output_csv: "data/logs/metadata_tagger_report.csv"
  frequency_aggregator:
    enabled: true

ingestion:
  metadata_tagger:
    enabled: true
    review_queue:
      enabled: true
      confidence_threshold: 0.35
      score_margin_threshold: 2.0
  extraction:
    enabled: true
  incremental_merge:
    enabled: false
  word_frequency_facets:
    enabled: false
  drift_detection:
    enabled: true
  export_corpus_overlap_fingerprints:
    enabled: false
  corpus_export:
    enabled: false
  frequency_aggregator:
    internal_language_branch: hye-w
    hybrid_profile: true
    wa_score_weight: 0.5
    incremental: true

export:
  output_dir: "data/export"
  dialect_filter: null
  formats: ["parquet"]
  release:
    output_dir: "data/releases/latest"
    dataset_name: "hytools-western-armenian-corpus"
    dataset_version: "0.1.0"
    split_seed: "hytools-release-v1"
    train_ratio: 0.90
    validation_ratio: 0.05
    test_ratio: 0.05
    include_huggingface: false
    include_full_parquet: true
    include_dataset_card: true
    include_checksums: true

scheduler:
  interval_seconds: 21600
  alert_window_seconds: 86400
  max_retries: 3
  alert_file: "data/logs/scheduler_alerts.jsonl"
  state_dir: "data/logs/scheduler"

research:
  exclude_dirs: ["augmented", "logs", "__pycache__"]
  exclude_sources: ["augmented"]
  error_threshold_pct: 10.0
  metadata_patterns: ["*.json", "*.jsonl"]
